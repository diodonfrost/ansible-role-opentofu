---
# vars file for opentofu in OpenBSD system
_opentofu_default_pkg_url: "https://github.com/opentofu/opentofu/releases/download/{{ _opentofu_version_to_install }}/tofu_{{ _opentofu_version_to_install | replace('v', '') }}_openbsd_{{ _opentofu_arch_map[ansible_facts['architecture']] }}.zip"
_opentofu_default_path: /usr/local/bin
