---
# vars file for ansible-role-opentofu

_opentofu_arch_map:
  i386: '386'
  x86_64: 'amd64'
  amd64: 'amd64'
  aarch64: 'arm64'
  armv7l: 'arm'
  armv6l: 'arm'
  64-bit: 'amd64'

_opentofu_default_checksum_url: "https://github.com/opentofu/opentofu/releases/download/{{ _opentofu_version_to_install }}/tofu_{{ _opentofu_version_to_install | replace('v', '') }}_SHA256SUMS"
